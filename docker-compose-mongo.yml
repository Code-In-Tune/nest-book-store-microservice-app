services:
  mongo:
    image: mongo:7
    container_name: book_store_mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: rootpass
      MONGO_INITDB_DATABASE: book_store_db
    volumes:
      - mongo_data:/data/db
      - ./docker/mongo/script:/docker-entrypoint-initdb.d:ro
      - ./docker/mongo/seed/books.json:/books.json:ro

  mongo-express:
    image: mongo-express:1
    container_name: book_store_mongo_express
    restart: unless-stopped
    ports:
      - '8081:8081'
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: root
      ME_CONFIG_MONGODB_ADMINPASSWORD: rootpass
      ME_CONFIG_MONGODB_SERVER: mongo
      ME_CONFIG_BASICAUTH: 'false'
    depends_on:
      - mongo

volumes:
  mongo_data:
